<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="24" fill="#F8FAFC"/>
  <text x="70" y="88" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="40" font-weight="700" fill="#0F172A">中国大陆用户买 USDT，我最关心的不是“能不能买”</text>
  <text x="70" y="128" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#475569">我更关心：支付会不会出问题、钱路干不干净、买完你会不会提、会不会发。</text>
  <defs><filter id="shadow" x="0" y="0" width="200%" height="200%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#CBD5E1" flood-opacity="0.45"/></filter></defs>
  <g filter="url(#shadow)"><rect x="90" y="190" width="320" height="220" rx="24" fill="#DBEAFE"/><text x="125" y="245" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="30" font-weight="700" fill="#1D4ED8">路径一：综合平台</text><text x="125" y="288" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#1E293B">Binance / OKX / Bybit</text><text x="125" y="328" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">优点：路径全、讨论多、上手快</text><text x="125" y="360" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">风险：支付风控、问题资金、</text><text x="125" y="390" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">买完后不会提币不会转账</text></g>
  <g filter="url(#shadow)"><rect x="440" y="190" width="320" height="220" rx="24" fill="#DCFCE7"/><text x="475" y="245" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="30" font-weight="700" fill="#15803D">路径二：持牌 / 合规</text><text x="475" y="288" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#1E293B">OSL / 更偏香港条件</text><text x="475" y="328" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">优点：身份和合规感更强</text><text x="475" y="360" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">限制：不是所有大陆用户都能</text><text x="475" y="390" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">顺手走这条路</text></g>
  <g filter="url(#shadow)"><rect x="790" y="190" width="320" height="220" rx="24" fill="#FCE7F3"/><text x="825" y="245" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="30" font-weight="700" fill="#BE185D">路径三：先学后买</text><text x="825" y="288" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#1E293B">先跑小额，再决定加码</text><text x="825" y="328" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">这是我最推荐新手的方式</text><text x="825" y="360" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">先理解：买 → 提 → 钱包 → 转账</text><text x="825" y="390" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">别一开始就把预算砸进去</text></g>
  <g filter="url(#shadow)"><rect x="110" y="470" width="980" height="180" rx="24" fill="#FFFFFF"/><text x="145" y="525" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="28" font-weight="700" fill="#0F172A">我给中国大陆新手的 4 条默认规则</text><text x="145" y="570" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#334155">1. 先小额跑通，不先大额试胆量</text><text x="145" y="603" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#334155">2. 支付风控和问题资金，比“最低价”更重要</text><text x="620" y="570" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#334155">3. 买完以后要立刻补钱包、转账、网络</text><text x="620" y="603" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#334155">4. 只要自己没看懂，就先停</text></g>
</svg>
