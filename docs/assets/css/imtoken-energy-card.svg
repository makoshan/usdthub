  <text x="84" y="238" fill="#374151" font-size="24" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial">文章里最值得新手记住的三条：</text>
  <text x="104" y="292" fill="#111827" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial">• 方法一：用 TRX 租赁（推荐）—— 一键租能量 / 按需租能量</text>
  <text x="104" y="338" fill="#111827" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial">• 方法二：直接燃烧 TRX —— 钱包里常备 50–100 TRX 兜底</text>
  <text x="104" y="384" fill="#111827" font-size="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial">• 方法三：冻结 TRX —— Stake 2.0 解冻要等 14 天</text>
