<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="24" fill="#F8FAFC"/>
  <text x="70" y="88" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="40" font-weight="700" fill="#0F172A">我怎么判断要不要认真研究 TRON 能量</text>
  <text x="70" y="128" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#475569">不是每个新手都该立刻钻进去。先看你是偶尔转，还是已经高频在用。</text>
  <defs><filter id="shadow" x="0" y="0" width="200%" height="200%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#CBD5E1" flood-opacity="0.45"/></filter></defs>
  <g filter="url(#shadow)"><rect x="100" y="210" width="290" height="220" rx="24" fill="#DBEAFE"/><text x="135" y="268" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="30" font-weight="700" fill="#1D4ED8">偶尔转账</text><text x="135" y="318" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#1E293B">先接受单次成本</text><text x="135" y="352" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">先把链、地址、流程跑通</text><text x="135" y="382" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">不要先研究优化体系</text></g>
  <g filter="url(#shadow)"><rect x="455" y="210" width="290" height="220" rx="24" fill="#DCFCE7"/><text x="490" y="268" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="30" font-weight="700" fill="#15803D">开始频繁用</text><text x="490" y="318" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#1E293B">这时才值得算账</text><text x="490" y="352" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">比较：直接付费 vs 冻结 vs 租用</text><text x="490" y="382" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">看你的频率够不够高</text></g>
  <g filter="url(#shadow)"><rect x="810" y="210" width="290" height="220" rx="24" fill="#FCE7F3"/><text x="845" y="268" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="30" font-weight="700" fill="#BE185D">高频结算</text><text x="845" y="318" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#1E293B">必须研究资源模型</text><text x="845" y="352" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">带宽、能量、冻结、租用</text><text x="845" y="382" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">都开始影响总成本</text></g>
  <g filter="url(#shadow)"><rect x="120" y="500" width="960" height="150" rx="24" fill="#FFFFFF"/><text x="155" y="554" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="28" font-weight="700" fill="#0F172A">我最常提醒新手的一句人话</text><text x="155" y="603" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="24" fill="#334155">TRON 能量不是先学完才配转账；而是你已经开始频繁用时，才值得花脑子优化它。</text></g>
</svg>
