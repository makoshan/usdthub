<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="24" fill="#F8FAFC"/>
  <text x="70" y="88" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="40" font-weight="700" fill="#0F172A">USDT 在新手流程里到底扮演什么角色</text>
  <text x="70" y="128" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#475569">一句话：它更像中间结算层，不是终点，也不是所有问题的答案。</text>

  <defs>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#CBD5E1" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="8" refY="8" orient="auto">
      <path d="M2 2L14 8L2 14V2Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <g filter="url(#shadow)">
    <rect x="90" y="210" width="250" height="180" rx="24" fill="#DBEAFE"/>
    <text x="125" y="260" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="32" font-weight="700" fill="#1D4ED8">法币入口</text>
    <text x="125" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#1E293B">人民币 / 银行卡 / 支付工具</text>
    <text x="125" y="340" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">你真正先处理的不是币，</text>
    <text x="125" y="370" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">而是钱怎么进来。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="180" width="280" height="240" rx="24" fill="#DCFCE7"/>
    <text x="505" y="238" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="36" font-weight="700" fill="#15803D">USDT</text>
    <text x="505" y="282" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="24" fill="#1E293B">稳定的中间结算层</text>
    <text x="505" y="326" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">- 买币时常先经过它</text>
    <text x="505" y="356" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">- 转账和支付时更容易理解</text>
    <text x="505" y="386" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">- 方便从平台走向钱包和使用场景</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="210" width="240" height="180" rx="24" fill="#FCE7F3"/>
    <text x="915" y="260" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="32" font-weight="700" fill="#BE185D">目标动作</text>
    <text x="915" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#1E293B">买 BTC / ETH</text>
    <text x="915" y="338" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#1E293B">转账 / 收款</text>
    <text x="915" y="371" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#1E293B">AI / eSIM / 旅行 / 结算</text>
  </g>

  <line x1="340" y1="300" x2="470" y2="300" stroke="#94A3B8" stroke-width="8" marker-end="url(#arrow)"/>
  <line x1="750" y1="300" x2="880" y2="300" stroke="#94A3B8" stroke-width="8" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="130" y="490" width="940" height="170" rx="24" fill="#FFFFFF"/>
    <text x="165" y="545" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="28" font-weight="700" fill="#0F172A">我对新手的理解方式</text>
    <text x="165" y="590" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#334155">BTC 更像资产本体，ETH 更像生态燃料，USDT 更像一条稳定的中间通道。</text>
    <text x="165" y="625" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#334155">你先把这个角色关系想明白，后面的买、提、转、付，都会轻松很多。</text>
  </g>
</svg>
