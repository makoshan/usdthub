{% assign hub = site.data.hub_sections %}
<div class="site-header-shell">
  <nav class="site-nav" aria-label="Primary">
    <a class="brand" href="{{ '/index.html' | relative_url }}">{{ hub.brand.name }}</a>
    <div class="site-nav-links">
      {% for section in hub.sections %}
      <a href="{{ section.permalink | relative_url }}">{{ section.label }}</a>
      {% endfor %}
    </div>
  </nav>
</div>
