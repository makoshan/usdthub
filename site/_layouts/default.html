<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title and page.title != site.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  {% if page.canonical %}<link rel="canonical" href="{{ page.canonical }}" />{% endif %}
</head>
<body>
  <header>
    <div class="wrap">
      {% include nav.html %}
    </div>
  </header>
  <main>
    <div class="wrap">
      {{ content }}
    </div>
  </main>
</body>
</html>
