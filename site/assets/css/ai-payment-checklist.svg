<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" rx="24" fill="#F8FAFC"/>
  <text x="70" y="88" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="40" font-weight="700" fill="#0F172A">用 USDT 订阅 AI，我会先过这 4 关</text>
  <text x="70" y="128" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#475569">真正高频出错的，不是支付本身，而是链、钱包、授权和记录。</text>
  <defs><filter id="shadow" x="0" y="0" width="200%" height="200%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#CBD5E1" flood-opacity="0.45"/></filter></defs>
  <g filter="url(#shadow)"><rect x="90" y="210" width="220" height="180" rx="24" fill="#DBEAFE"/><text x="120" y="262" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="28" font-weight="700" fill="#1D4ED8">1. 钱包</text><text x="120" y="308" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">先准备好</text><text x="120" y="338" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">别付款时临时找</text></g>
  <g filter="url(#shadow)"><rect x="350" y="210" width="220" height="180" rx="24" fill="#DCFCE7"/><text x="380" y="262" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="28" font-weight="700" fill="#15803D">2. 网络</text><text x="380" y="308" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">先确认对方收哪条链</text><text x="380" y="338" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">不要凭感觉发</text></g>
  <g filter="url(#shadow)"><rect x="610" y="210" width="220" height="180" rx="24" fill="#FCE7F3"/><text x="640" y="262" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="28" font-weight="700" fill="#BE185D">3. 授权</text><text x="640" y="308" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">支付钱包和主钱包分开</text><text x="640" y="338" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">别拿主仓到处签名</text></g>
  <g filter="url(#shadow)"><rect x="870" y="210" width="220" height="180" rx="24" fill="#FEF3C7"/><text x="900" y="262" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="28" font-weight="700" fill="#B45309">4. 记录</text><text x="900" y="308" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">TxID、订单号、截图</text><text x="900" y="338" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="20" fill="#334155">不留记录最麻烦</text></g>
  <g filter="url(#shadow)"><rect x="110" y="470" width="980" height="150" rx="24" fill="#FFFFFF"/><text x="145" y="524" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="28" font-weight="700" fill="#0F172A">我对 AI 支付场景的默认建议</text><text x="145" y="573" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="24" fill="#334155">第一次只测小额；任何需要频繁授权的网站，都别直接用长期存钱的钱包。</text></g>
</svg>
