<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" rx="24" fill="#F8FAFC"/>
  <text x="70" y="88" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="40" font-weight="700" fill="#0F172A">发送 USDT 前，我会按这张清单过一遍</text>
  <text x="70" y="128" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="22" fill="#475569">绝大多数事故都不是因为技术太难，而是因为有人以为自己不用再看一眼。</text>
  <defs>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#CBD5E1" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="90" y="190" width="1020" height="420" rx="24" fill="#FFFFFF"/>
    <text x="130" y="250" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="30" font-weight="700" fill="#0F172A">发送前 5 问</text>
    <text x="130" y="305" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="24" fill="#1E293B">① 对方收的是哪条链？</text>
    <text x="130" y="348" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="24" fill="#1E293B">② 地址是不是完整、首尾字符对得上？</text>
    <text x="130" y="391" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="24" fill="#1E293B">③ 金额、币种、备注规则有没有看清？</text>
    <text x="130" y="434" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="24" fill="#1E293B">④ 钱包资源够不够？如果走 TRON，TRX / 能量够吗？</text>
    <text x="130" y="477" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="24" fill="#1E293B">⑤ 这是不是第一次给这个地址打款？如果是，先小额测试。</text>

    <rect x="130" y="525" width="940" height="60" rx="16" fill="#FEF3C7"/>
    <text x="160" y="565" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Arial" font-size="24" font-weight="700" fill="#92400E">我自己的默认规则：只要是新地址、新商家、新路径，先测一笔再说。</text>
  </g>
</svg>
