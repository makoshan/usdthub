<p class="wysiwyg-text-align-justify"><span style="color: #000000;">说明你的账户还没有被激活，向账户中转入 TRX 即可激活。激活后的账户每 24 小时可以免费获得 600 B 的带宽资源。</span></p><p class="wysiwyg-text-align-justify"><span style="color: #000000;">激活后如果要发起转账，需消耗带宽、能量等资源。若钱包中没有足够可用的 TRX 来提供这些资源，转账时就会出现失败或被提示没有足够的带宽。</span></p><p class="wysiwyg-text-align-justify"><span style="color: #000000;">因此建议你向钱包中转入 50～100 个 TRX，即可激活账户并满足后续转账等操作的需求。</span></p>
