<p class="wysiwyg-text-align-justify"><span style="color: #000000;">冻结 TRX 获取资源时提示「Account does not exist」（账户不存在），说明你的钱包账户还未激活，请转入 TRX 至钱包激活账户。</span></p><p class="wysiwyg-text-align-justify"><span style="color: #000000;">激活后如果要发起转账等操作，需消耗带宽、能量等资源。若钱包中没有足够可用的 TRX 来提供这些资源，操作时就会出现失败或被提示没有足够的带宽。</span></p><p class="wysiwyg-text-align-justify"><span style="color: #000000;">建议你向钱包中转入 50～100 个 TRX，即可满足很多次转账等操作的需求。</span></p>
