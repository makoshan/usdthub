<p class="wysiwyg-text-align-left"><span style="color: #000000;"><span style="font-weight: 400;">向钱包地址中转入 TRX 即可激活账户。</span></span></p><p class="wysiwyg-text-align-left"><span style="color: #000000;"><span style="font-weight: 400;">激活后如果要发起转账，需消耗带宽、能量等资源。若钱包中没有足够可用的 TRX 来提供这些资源，转账时就会出现失败或被提示没有足够的带宽。</span></span></p><p class="wysiwyg-text-align-left"><span style="color: #000000;"><span style="font-weight: 400;">因此建议你向钱包中转入 50～100 个 TRX，即可激活账户并满足后续转账等操作的需求。</span></span></p><p class="wysiwyg-text-align-left"><span style="color: #000000;"><span style="font-weight: 400;">相关阅读：</span></span><a href="https://support.token.im/hc/zh-cn/articles/4404302141721-"><span style="color: #096ECC;"><span style="font-weight: 400;"><span class="wysiwyg-underline">在波场转账时的能量和带宽是什么？</span></span></span></a></p>
