<p class="wysiwyg-text-align-justify"><span style="color: #000000;"><span style="font-weight: 400;">这是因为对方此前没有向该收款地址转入过 TRX，仍处于未激活状态。未激活的钱包地址也可用于正常收款，请不必担心。</span></span></p><p class="wysiwyg-text-align-justify"><span style="color: #000000;"><span style="font-weight: 400;">需注意的是，向未激活的地址转账会额外消耗你 1.1 个 TRX，所以在全额转账 TRX 时请在钱包中预留不少于 1.1 个以上的 TRX，否则会导致无法正常转账。</span></span></p><p class="wysiwyg-text-align-justify"><span style="color: #000000;"><span style="font-weight: 400;">了解更多：</span></span><a href="https://support.token.im/hc/zh-cn/articles/4513200787609"><span style="color: #096ECC;"><span style="font-weight: 400;"><span class="wysiwyg-underline">如何激活 TRX 钱包地址</span></span></span></a></p>
